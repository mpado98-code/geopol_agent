name: GeoMacro Overview Weekly Report

# Triggers:
#  - Cron schedulato la domenica 17:00 UTC (= 18:00 ITA in ora solare,
#    19:00 ITA in ora legale). Per coprire l'ora legale aggiungiamo un
#    secondo cron alle 16:00 UTC: GitHub Actions invocherà entrambi, ma
#    il workflow ha logica interna che NON si attiva due volte perché
#    inviamo direttamente il report. Per evitare doppio invio, abilitiamo
#    solo uno dei due cron a seconda della stagione, oppure accettiamo un
#    doppio invio raro (vedi nota nella guida setup).
#  - workflow_dispatch: lancio manuale dalla UI di GitHub.
on:
  schedule:
    # Ora solare europea (CET, UTC+1): 17:00 UTC -> 18:00 ITA
    - cron: '0 17 * * 0'
    # Ora legale europea (CEST, UTC+2): 16:00 UTC -> 18:00 ITA
    # Decommentare manualmente quando passi all'ora legale, oppure
    # mantenere entrambi attivi e accettare invio singolo perché il
    # secondo cron arriverà 1h dopo (vedi guida).
    # - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  geomacro:
    name: Genera e invia GeoMacro Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r geomacro_requirements.txt

      - name: Run GeoMacro bot
        env:
          TELEGRAM_BOT_TOKEN_GEOMACRO: ${{ secrets.TELEGRAM_BOT_TOKEN_GEOMACRO }}
          TELEGRAM_CHAT_ID_GEOMACRO: ${{ secrets.TELEGRAM_CHAT_ID_GEOMACRO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python geomacro_bot.py
